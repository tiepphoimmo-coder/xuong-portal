# Xuong KOL - Van phong · compose cho Arcane
# Arcane chi PULL image (GitHub Actions da build san). Dan noi dung nay vao compose.yaml,
# va dat SYNC_TOKEN trong file .env cua project.
services:
  xuong-portal:
    image: ghcr.io/tiepphoimmo-coder/xuong-portal:latest
    container_name: xuong-portal
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - xuong_data:/data
    ports:
      # doi domain sau; tam thoi expose de test qua http://IP-VPS:8091
      - "8091:8091"

volumes:
  xuong_data:
