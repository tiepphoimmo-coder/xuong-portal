# Xuong KOL - Van phong · stack cho Arcane
# Cach dung: xem HUONG-DAN-ARCANE.md cung thu muc
services:
  xuong-portal:
    build: .
    container_name: xuong-portal
    restart: unless-stopped
    environment:
      STUDIO_MODE: portal
      STUDIO_ORIGIN: vps
      DATA_HOME: /data
      PORT: "8091"
      # Token cho sync agent (PC goi len). DAT GIA TRI MANH truoc khi deploy!
      SYNC_TOKEN: ${SYNC_TOKEN:?dat SYNC_TOKEN trong file .env cua stack}
    volumes:
      - xuong_data:/data
    ports:
      # Chi publish noi bo; reverse proxy (NPM/Traefik/Caddy) tro vao day
      - "127.0.0.1:8091:8091"
    # Neu VPS dung Traefik, bo ports va mo labels duoi (sua domain):
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.xuong.rule=Host(`xuong.tiepphoi.com`)
    #   - traefik.http.routers.xuong.entrypoints=websecure
    #   - traefik.http.routers.xuong.tls.certresolver=letsencrypt
    #   - traefik.http.services.xuong.loadbalancer.server.port=8091

volumes:
  xuong_data:
