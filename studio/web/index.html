<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Xưởng KOL · TiếpPhối Space</title>
<style>
  :root{
    --brand:#C15F3C; --brand-600:#A84E30; --brand-bg:#FBEEE8;
    --side:#221E18; --side-2:#2E2921; --side-tx:#B8B1A4; --side-on:#F5EFE6;
    --bg:#F6F4EF; --card:#FFFFFF; --bd:#E8E4DB; --bd2:#D5D0C4;
    --tx:#26231E; --mut:#8B867B;
    --acc:#185FA5; --accbg:#E8F1FA;
    --ok:#3B6D11; --okbg:#EAF3DE; --run:#0F6E56; --runbg:#E1F5EE;
    --warn:#854F0B; --warnbg:#FAEEDA; --err:#A32D2D; --errbg:#FCEBEB;
    --r:12px; --sh:0 1px 2px rgba(35,30,22,.05); --sh2:0 6px 20px rgba(35,30,22,.10);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--tx);font-size:14.5px;display:flex}

  /* ===== SIDEBAR ===== */
  aside{width:222px;flex:0 0 222px;background:var(--side);color:var(--side-tx);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .logo{display:flex;align-items:center;gap:11px;padding:18px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
  .logo .mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand),#D98157);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;letter-spacing:.5px;flex:0 0 auto;box-shadow:0 2px 8px rgba(193,95,60,.45)}
  .logo .lt b{display:block;color:var(--side-on);font-size:15px;letter-spacing:.2px}
  .logo .lt span{font-size:11px;color:var(--side-tx);letter-spacing:.6px;text-transform:uppercase}
  /* ===== CHE DO VAN PHONG (portal) ===== */
  .vpbadge{display:inline-block;margin-top:3px;font-size:9px;letter-spacing:.8px;color:var(--brand);border:1px solid var(--brand);border-radius:5px;padding:1px 6px;text-transform:uppercase;font-weight:700}
  .authchip{display:inline-block;font-size:9.5px;padding:1px 6px;border-radius:5px;background:var(--brand-bg);color:var(--brand);margin-left:5px;vertical-align:middle}
  /* avatar header + trang Tai khoan */
  .mebtn{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--bd);border-radius:99px;padding:3px 12px 3px 3px;cursor:pointer;height:33px}
  .mebtn:hover{border-color:var(--bd2)}
  .meav{width:27px;height:27px;border-radius:50%;object-fit:cover;flex:0 0 auto;background:linear-gradient(135deg,var(--brand),#D98157);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;overflow:hidden}
  .meav img{width:100%;height:100%;object-fit:cover}
  .mename{font-size:13px;font-weight:600;color:var(--tx);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .avbig{width:82px;height:82px;border-radius:50%;object-fit:cover;background:linear-gradient(135deg,var(--brand),#D98157);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;overflow:hidden}
  .avbig img{width:100%;height:100%;object-fit:cover}
  .urow{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid var(--bd);border-radius:var(--r);background:var(--card);margin-bottom:8px;flex-wrap:wrap}
  .urow select{width:auto;flex:0 0 auto;min-width:120px;height:32px}
  .urow .mini,.urow .ust{flex:0 0 auto;white-space:nowrap}
  .pcard .mini{flex:0 0 auto;white-space:nowrap}
  .urow .uav{width:40px;height:40px;border-radius:50%;object-fit:cover;flex:0 0 auto;background:linear-gradient(135deg,var(--brand),#D98157);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;overflow:hidden}
  .urow .uav img{width:100%;height:100%;object-fit:cover}
  .ust{font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px}
  .ust.active{background:var(--okbg);color:var(--ok)} .ust.pending{background:var(--warnbg);color:var(--warn)} .ust.disabled{background:var(--errbg);color:var(--err)}
  .pcard{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--warn);background:var(--warnbg);border-radius:var(--r);margin-bottom:8px}
  .tmpbox{margin-top:8px;padding:8px 10px;background:var(--accbg);color:var(--acc);border-radius:8px;font-family:ui-monospace,monospace;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  body.portal #fab,body.portal #apanel,body.portal .sfoot,
  body.portal nav a[data-v="staff"],body.portal nav a[data-v="flowaccts"],
  body.portal nav a[data-v="projects"],
  body.portal .prodbtn,body.portal .napbtn{display:none!important}
  .navgrp{padding:14px 10px 2px}
  .navgrp .gt{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:#736D60;padding:0 10px;margin-bottom:6px}
  nav a{display:flex;align-items:center;gap:10px;color:var(--side-tx);text-decoration:none;font-size:13.5px;padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;border-left:3px solid transparent}
  nav a .ic{width:18px;text-align:center;font-size:14px;opacity:.9}
  nav a:hover{background:var(--side-2);color:var(--side-on)}
  nav a.on{background:var(--side-2);color:var(--side-on);border-left-color:var(--brand);font-weight:600}
  nav a .cnt{margin-left:auto;font-size:11px;background:rgba(255,255,255,.09);padding:1px 7px;border-radius:99px}
  nav a .cnt.hot{background:var(--brand);color:#fff}
  .sfoot{margin-top:auto;padding:12px 14px;border-top:1px solid rgba(255,255,255,.07);font-size:12px;display:flex;align-items:center;gap:8px}
  .sfoot .adot2{width:8px;height:8px;border-radius:50%;background:#777;flex:0 0 auto}
  .sfoot .adot2.on{background:#2FBF71;box-shadow:0 0 6px rgba(47,191,113,.8)}

  /* ===== MAIN ===== */
  #wrap{flex:1;min-width:0;display:flex;flex-direction:column;min-height:100vh}
  #topbar{padding:0;background:var(--card);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:5}
  #topbar .tbinner{display:flex;align-items:center;gap:14px;max-width:1320px;width:100%;margin:0 auto;padding:14px 30px}
  #topbar h1{font-size:16.5px;margin:0;font-weight:700;letter-spacing:.2px}
  #topbar .tdesc{font-size:12.5px;color:var(--mut)}
  #topbar .tact{margin-left:auto;display:flex;gap:8px;align-items:center}
  main{max-width:1320px;width:100%;margin:0 auto;padding:26px 30px 60px}
  #wrap.full main,#wrap.full #topbar .tbinner{max-width:none}

  h2{font-size:13px;color:var(--mut);font-weight:600;margin:0 0 10px;display:flex;align-items:center;gap:12px;text-transform:uppercase;letter-spacing:.8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:26px}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:13px;cursor:pointer;transition:box-shadow .12s,border-color .12s,transform .12s;position:relative;box-shadow:var(--sh)}
  .card:hover{border-color:var(--bd2);box-shadow:var(--sh2);transform:translateY(-1px)}
  .card.sel{border:2px solid var(--brand);padding:12px;box-shadow:0 0 0 3px var(--brand-bg)}
  .card.add{border:1.5px dashed var(--bd2);display:flex;align-items:center;justify-content:center;gap:6px;color:var(--mut);min-height:68px;box-shadow:none;background:transparent}
  .card.add:hover{color:var(--brand);border-color:var(--brand);transform:none}
  .row{display:flex;align-items:center;gap:10px}
  .card .row>div:last-child{min-width:0;flex:1;padding-right:24px}
  .av{width:44px;height:44px;border-radius:50%;background:var(--brand-bg);color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:600;overflow:hidden;flex:0 0 auto}
  .av img,.sq img{width:100%;height:100%;object-fit:cover}
  .sq{width:44px;height:44px;border-radius:10px;background:var(--accbg);color:var(--acc);display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto}
  .nm{font-weight:600;font-size:14px;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden} .sub{font-size:12px;color:var(--mut);overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .code{font-family:ui-monospace,monospace;font-size:11px;background:var(--bg);color:var(--acc);padding:1px 6px;border-radius:5px;border:1px solid var(--bd)}
  .code.copy{cursor:pointer}
  .code.copy:hover{border-color:var(--acc);background:var(--accbg)}
  .code.copy .ci{opacity:.55;margin-left:3px;font-family:system-ui}
  .code.copied{background:var(--okbg);color:var(--ok);border-color:var(--ok)}
  .niche{font-size:11px;background:var(--warnbg);color:var(--warn);padding:1px 7px;border-radius:5px;font-weight:500}
  .nfbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .nf{font-size:13px;padding:5px 13px;border-radius:99px;background:var(--card);border:1px solid var(--bd2);color:var(--mut);cursor:pointer;user-select:none}
  .nf:hover{border-color:var(--brand);color:var(--brand)}
  .nf.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .nf b{font-weight:600;opacity:.75;margin-left:2px}

  label{font-size:12px;color:var(--mut);display:block;margin-bottom:4px;font-weight:500}
  select,input,textarea{width:100%;height:37px;border:1px solid var(--bd2);border-radius:9px;padding:0 11px;font-size:14px;background:var(--card);color:var(--tx);font-family:inherit}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-bg)}
  textarea{height:auto;padding:9px 11px;min-height:70px;line-height:1.5}
  .cfg{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
  button{height:37px;border:1px solid var(--bd2);background:var(--card);color:var(--tx);border-radius:9px;padding:0 15px;font-size:13px;cursor:pointer;font-weight:500;font-family:inherit}
  button:hover{background:var(--bg);border-color:var(--bd2)}
  button.primary{background:var(--brand);color:#fff;border:none;height:39px;padding:0 18px;font-size:14px;font-weight:600;box-shadow:0 2px 6px rgba(193,95,60,.35)}
  button.primary:hover{background:var(--brand-600)}
  button.mini{height:27px;padding:0 10px;font-size:12px}

  .brief{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:12px 15px;margin-bottom:9px;box-shadow:var(--sh)}
  .badge{font-size:12px;padding:2px 10px;border-radius:99px;min-width:96px;text-align:center;white-space:nowrap;font-weight:500}
  .modal{position:fixed;inset:0;background:rgba(30,25,18,.45);display:none;align-items:center;justify-content:center;z-index:9;backdrop-filter:blur(2px)}
  .modal.on{display:flex}
  .sheet{background:var(--card);border-radius:16px;padding:22px;width:490px;max-width:92vw;max-height:90vh;overflow:auto;box-shadow:0 18px 60px rgba(30,25,18,.35)}
  .sheet h3{margin:0 0 14px;font-size:16px}
  .fld{margin-bottom:12px}
  .hint{font-size:12px;color:var(--mut)}
  video{width:100%;border-radius:10px;margin-top:8px;background:#000}
  .tools{position:absolute;top:9px;right:11px;display:flex;gap:9px}
  .tools span{cursor:pointer;color:var(--mut);font-size:15px}
  .tools span:hover{color:var(--brand)}
  .cmd{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-family:ui-monospace,monospace;font-size:13px;margin-top:8px;display:flex;align-items:center;gap:8px;justify-content:space-between}
  .instr{font-size:13px;color:var(--mut);margin-top:6px;white-space:pre-wrap;line-height:1.5}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .thumb{position:relative;width:70px;height:70px;border-radius:8px;overflow:hidden;border:1px solid var(--bd2);background:var(--bg)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .thx{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:12px;line-height:18px;text-align:center;cursor:pointer}
  .thumb .cap{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:9px;text-align:center;padding:1px 0}
  .thumb.rm{opacity:.4} .thumb.rm img{filter:grayscale(1)} .thumb.rm .thx{background:var(--brand)}
  .wbtn{display:inline-flex;align-items:center;gap:4px;margin-top:5px;font-size:12px;color:var(--acc);cursor:pointer}
  .wbtn:hover{text-decoration:underline}
  .ofit{display:flex;gap:10px;align-items:center;padding:10px;border:1px solid var(--bd);border-radius:10px;margin-bottom:8px}
  .ofit .oimg{width:52px;height:52px;border-radius:8px;object-fit:cover;background:var(--bg);flex:0 0 auto}
  .ofit .oimg.ph{display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:20px}
  .otools{margin-left:auto;display:flex;gap:10px}.otools span{cursor:pointer;color:var(--mut)}
  .beat{display:flex;gap:10px;padding:9px 0;border-top:1px solid var(--bd)}
  .beat:first-child{border-top:none}
  .beat .role{flex:0 0 92px;font-size:12px;font-weight:600;color:var(--acc)}
  .beat .role small{display:block;color:var(--mut);font-weight:400}
  .beat .btxt{font-size:13px;line-height:1.5}
  .beat .btxt .vis{color:var(--mut);font-size:12px;margin-top:2px}
  .ph{color:var(--brand);font-weight:500}
  .tcard .sub2{font-size:12px;color:var(--mut);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .phlist{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--mut);margin:8px 0;line-height:1.7}
  .phlist code{background:var(--card);color:var(--brand);padding:1px 5px;border-radius:4px;font-size:11px}
  .back{color:var(--acc);cursor:pointer;font-size:13px;display:inline-block;margin-bottom:12px}
  .back:hover{text-decoration:underline}

  /* ===== SECTIONS / PROJECT ===== */
  .psec{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:17px 19px;margin-bottom:14px;box-shadow:var(--sh)}
  .psec h3{margin:0 0 10px;font-size:14px;display:flex;align-items:center;gap:9px}
  .psec h3 .step{width:23px;height:23px;border-radius:50%;background:var(--brand-bg);color:var(--brand);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:0 0 auto}
  .scriptbox{white-space:pre-wrap;font-size:13px;line-height:1.6;color:var(--tx)}
  .scene{display:grid;grid-template-columns:200px 1fr;gap:16px;padding:15px 0;border-top:1px solid var(--bd)}
  .scene:first-of-type{border-top:none}
  .scene .sb{width:200px;border-radius:9px;overflow:hidden;background:var(--bg);border:1px solid var(--bd)}
  .scene .sb img,.scene .sb video{width:100%;display:block}
  .scene .sb.empty{height:112px;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:12px}
  .scene .sinfo .slabel{font-size:11.5px;color:var(--mut);margin:9px 0 3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .scene .voice{font-size:14px;line-height:1.55}
  .scene .snum{font-weight:700;font-size:14px;color:var(--brand)}
  .pstat{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:600}
  .pdone{background:var(--okbg);color:var(--ok)} .pprod{background:var(--runbg);color:var(--run)} .pplan{background:var(--warnbg);color:var(--warn)}
  .finalvid video{width:100%;border-radius:10px}
  /* dU AN — layout moi gon */
  .pjhead{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
  .pjtitle{font-size:18px;font-weight:700;line-height:1.3;margin:2px 0 4px}
  .pjmeta{font-size:12.5px;color:var(--mut)}
  .pjgrid{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
  #wrap.full .pjgrid{grid-template-columns:1fr minmax(360px,440px)}
  .pjside{position:sticky;top:80px}
  .scenegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
  .scard{border:1px solid var(--bd);border-radius:11px;padding:10px;background:var(--card);box-shadow:var(--sh)}
  .scardtop{display:flex;gap:7px;margin-bottom:8px}
  .scsb,.scvid{flex:1;min-width:0;border-radius:8px;overflow:hidden;background:var(--bg);border:1px solid var(--bd);height:150px}
  .scsb{cursor:zoom-in}
  .scsb img{width:100%;height:100%;object-fit:cover;display:block}
  .scsb.empty{cursor:default;color:var(--mut);font-size:11px;text-align:center;padding:6px;display:flex;align-items:center;justify-content:center}
  .scvid{background:#000;object-fit:cover}
  .scvid.ph{background:var(--bg);color:var(--mut);font-size:11.5px;display:flex;align-items:center;justify-content:center;border-style:dashed}
  .scnum{font-weight:700;font-size:13px;color:var(--brand);margin:2px 0 4px}
  .scnum .scttl{color:var(--tx);font-weight:600}
  .scvoice{font-size:12.5px;line-height:1.5;color:var(--tx);margin-bottom:8px;max-height:110px;overflow:auto}
  .promptdet{margin-bottom:8px;font-size:12px}
  .promptdet summary{cursor:pointer;color:var(--mut);font-weight:600;padding:4px 0;user-select:none}
  .promptdet summary:hover{color:var(--brand)}
  .promptdet .pl{font-size:11px;color:var(--mut);font-weight:600;margin:6px 0 3px;display:flex;align-items:center;gap:6px}
  .promptdet .pv{white-space:pre-wrap;font-size:11px;line-height:1.45;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:7px 9px;max-height:150px;overflow:auto;margin:0;font-family:inherit;color:var(--tx)}
  .scact{display:flex;align-items:center;gap:10px;border-top:1px solid var(--bd);padding-top:8px}
  @media (max-width:820px){ .pjgrid{grid-template-columns:1fr} .pjside{position:static} }
  /* pipeline stepper */
  .pipe{display:flex;flex-wrap:wrap;gap:0;margin:2px 0 18px;align-items:center}
  .pipe .pst{display:flex;align-items:center;gap:7px;font-size:12.5px;padding:6px 13px;background:var(--card);border:1px solid var(--bd);color:var(--mut)}
  .pipe .pst:first-child{border-radius:99px 0 0 99px}
  .pipe .pst:last-child{border-radius:0 99px 99px 0}
  .pipe .pst+.pst{border-left:none}
  .pipe .pst .pd{width:17px;height:17px;border-radius:50%;background:var(--bg);border:1px solid var(--bd2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;flex:0 0 auto}
  .pipe .pst.ok{color:var(--ok);font-weight:600}
  .pipe .pst.ok .pd{background:var(--ok);border-color:var(--ok);color:#fff}
  .pipe .pst.part{color:var(--warn);font-weight:600}
  .pipe .pst.part .pd{background:var(--warnbg);border-color:var(--warn);color:var(--warn)}

  /* ===== DASHBOARD ===== */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:26px}
  .stat{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:15px 17px;box-shadow:var(--sh);cursor:pointer;transition:box-shadow .12s,transform .12s}
  .stat:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
  .stat .sv{font-size:26px;font-weight:800;letter-spacing:-.5px}
  .stat .sl{font-size:12px;color:var(--mut);margin-top:2px}
  .stat .sic{float:right;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .flowmap{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:16px 19px;margin-bottom:26px;box-shadow:var(--sh)}
  .flowmap .fsteps{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:13px}
  .flowmap .fs{background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:8px 13px;display:flex;align-items:center;gap:7px}
  .flowmap .fs b{font-size:12px}
  .flowmap .fs .fn{width:19px;height:19px;border-radius:50%;background:var(--brand);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:0 0 auto}
  .flowmap .fa{color:var(--bd2);font-size:15px}
  /* nhan vien */
  .emps{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:6px}
  .emp{display:flex;gap:12px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:13px;box-shadow:var(--sh)}
  .emp.work{border-color:var(--run);box-shadow:0 0 0 2px var(--runbg)}

<script>
const $ = s => document.querySelector(s);
let KOLS=[], PRODS=[], BRIEFS=[], NICHES=[], TPLS=[], PROJS=[], STAFF=[], ENGINES=[], FLOWACCTS=[], FLOWPIN=null, FLOWBRIDGES=0, SCRIPTS=[], CHANS=[], MEDIA=[], scrF={}, scrShowRej=false, scrDoneAll=false, sel={kol:null,prod:null,tpl:""}, view="dash", nicheFilter="", curProj=null, _hashProj=null, stNiche="", stQ="", stKGroup="", stKQ="", kolFilter="";
const PLAT={facebook:{e:"📘",n:"Facebook"},tiktok:{e:"🎵",n:"TikTok"},youtube:{e:"▶️",n:"YouTube"},khac:{e:"📡",n:"Khác"}};
const chanById=id=>CHANS.find(c=>c.id===id);
const chanLabel=id=>{const c=chanById(id);return c?`${(PLAT[c.platform]||PLAT.khac).e} ${c.name}`:"";};
const api = (p,o) => fetch(p,o).then(r=>r.json());
window.PORTAL=false; window.CFG={}; window.ME=null; window.USERMAP={};
const _isAdminUI=()=>!window.PORTAL||(window.CFG&&window.CFG.role==='admin');
const authorName=u=>window.USERMAP[u]||u;
const avInner=(name,url)=>url?`<img src="${url}" alt="">`:esc(initials(name));
async function applyPortalUI(){
  if(!window.PORTAL) return;
  document.body.classList.add('portal');
  try{ window.ME=await api('/api/me'); }catch(e){ window.ME=null; }
  if(window.ME){ window.USERMAP[window.ME.user]=window.ME.display_name||window.ME.user; }
  const isAdmin=window.CFG.role==='admin';
  const lt=document.querySelector('.logo .lt');
  if(lt&&!lt.querySelector('.vpbadge')){
    const who=(window.CFG.user?(' · '+window.CFG.user+(isAdmin?' (admin)':'')):'');
    lt.insertAdjacentHTML('beforeend','<span class="vpbadge">Văn phòng'+esc(who)+'</span>');
  }
  const tact=document.querySelector('.tact');
  if(tact&&!tact.querySelector('.mebtn')){
    const me=window.ME||{user:window.CFG.user,display_name:window.CFG.user};
    tact.insertAdjacentHTML('afterbegin',
      `<button class="mebtn" onclick="openProfile()" title="Hồ sơ của tôi"><span class="meav" id="me-av">${avInner(me.display_name||me.user,me.avatar)}</span><span class="mename" id="me-name">${esc(me.display_name||me.user)}</span></button>`);
  }
  if(tact&&!tact.querySelector('.logoutbtn')) tact.insertAdjacentHTML('beforeend','<button class="mini logoutbtn" onclick="doLogout()">Đăng xuất</button>');
  const nu=document.getElementById('nav-users');
  if(nu&&isAdmin){ nu.style.display='flex'; loadUsers(); }
}
function _refreshMeHeader(){
  const me=window.ME; if(!me) return;
  const av=document.getElementById('me-av'), nm=document.getElementById('me-name');
  if(av) av.innerHTML=avInner(me.display_name||me.user,me.avatar?me.avatar+'?t='+Date.now():null);
  if(nm) nm.textContent=me.display_name||me.user;
}
window.doLogout=async()=>{ try{await fetch('/api/logout',{method:'POST'});}catch(e){} location.href='/'; };
const img = p => "/api/image?path="+encodeURIComponent(p);
const initials = n => (n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
const codeChip = c => c?`<span class="code copy" onclick="copyCode(event,'${esc(c)}')" title="Bấm để copy mã">${esc(c)}<span class="ci">⧉</span></span>`:'';
window.copyCode=(ev,code)=>{
  ev.stopPropagation();
  const el=ev.currentTarget;
  const flash=()=>{ el.classList.add("copied"); el.innerHTML=esc(code)+'<span class="ci">✓</span>';
    setTimeout(()=>{ el.classList.remove("copied"); el.innerHTML=esc(code)+'<span class="ci">⧉</span>'; },1100); };
  const fallback=()=>{ const ta=document.createElement("textarea"); ta.value=code; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); };
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(code).then(flash,()=>{fallback();flash();});
  else { fallback(); flash(); }
};

function fmtTime(ts){  // epoch giay -> "14:32 hôm nay" | "09:15 hôm qua" | "12/07" | "12/07/25"
  if(!ts) return "";
  const d=new Date(ts*1000), now=new Date();
  const day=x=>x.toDateString();
  const hm=`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  if(day(d)===day(now)) return `${hm} hôm nay`;
  if(day(d)===day(new Date(now-864e5))) return `${hm} hôm qua`;
  const dm=`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
  return d.getFullYear()===now.getFullYear()?dm:`${dm}/${String(d.getFullYear()).slice(2)}`;
}
function _scrDimVal(s,dim){  // gia tri cua 1 kich ban theo chieu loc -> mang (co the rong)
  if(dim==="kol") return s.kol?[s.kol]:[];
  if(dim==="product") return s.product?[s.product]:[];
  if(dim==="chan") return (s.channel&&chanById(s.channel))?[chanLabel(s.channel)]:[];
  if(dim==="staff"){ const st=_scrStaff(s); return st?["👤 "+st.emoji+" "+st.ten]:[]; }
  if(dim==="fmt"){ const fm=_scrFormat(s); return fm?[fm.emoji+" "+fm.label]:[]; }
  if(dim==="cau") return s.cau_truc?["Cấu trúc "+s.cau_truc]:[];
  if(dim==="tag") return (s.tags||[]).slice();
  return [];
}
function _dimVals(all,dim){  // [[value,count]] giam dan theo so luong
  const m=new Map();
  all.forEach(s=>_scrDimVal(s,dim).forEach(v=>m.set(v,(m.get(v)||0)+1)));
  return [...m.entries()].sort((a,b)=>b[1]-a[1]);
}

// tach 1 doan van thanh cac cau theo dau cau
function _sentences(t){
  return (t||"").replace(/\s+/g," ").trim().match(/[^.!?…]+[.!?…]*/g)||[t];
}
// gom cau thanh cac cum ~muc tieu am tiet (chuan 10s ~ 45-55), khong cat giua cau
function _chunkBySyllables(text, target=50, maxScenes=6){
  const sents=_sentences(text).map(s=>s.trim()).filter(Boolean);
  const out=[]; let cur="";
  for(const s of sents){
    const test=cur?cur+" "+s:s;
    // dong cum khi them cau moi se vuot ~55 am tiet (chia som cho khop clip 10s)
    if(cur && _syl(test)>target*1.1){ out.push(cur); cur=s; }
    else cur=test;
  }
  if(cur) out.push(cur);
  while(out.length>maxScenes){ out[out.length-2]+=" "+out.pop(); }
  return out;
}
window._nsSplit=()=>{
  const raw=($("#ns-full").value||"").trim();
  if(!raw){ alert("Dán kịch bản trước đã"); return; }
  // uu tien tach theo dong TRONG (user tu danh dau); khong co thi tu chia theo am tiet
  let parts=raw.split(/\n\s*\n+/).map(x=>x.replace(/\s+/g," ").trim()).filter(Boolean);
  if(parts.length<2){ parts=_chunkBySyllables(raw,50,6); }
  // moi part neu qua dai (>75 am tiet) -> chia nho tiep
  const scenes=[];
  parts.forEach(p=>{ (_syl(p)>75?_chunkBySyllables(p,50,4):[p]).forEach(x=>scenes.push(x)); });
  $("#nsScenes").innerHTML=scenes.map(v=>_nsSceneRow(v)).join("");
  _nsRenumber();
  document.querySelectorAll("#nsScenes .scnvoice").forEach(ta=>{ ta.style.height="auto"; ta.style.height=ta.scrollHeight+"px"; });
  _nsMode("scene");
  $("#ns-splithint").textContent="";
};

window._voices=[];
async function loadVoices(projectId, selected){
  const sel=$("#f-voiceid"), hint=$("#voicehint"); if(!sel) return;
  window._curVoiceProject=projectId||"";
  hint.textContent="đang tải danh sách giọng…";
  const r=await api("/api/voices?project_id="+encodeURIComponent(projectId||""));
  if(!r.ok){ hint.textContent="⚠️ Flow backend chưa bật (:8200) — không tải được giọng"; return; }
  window._voices=r.voices;
  const builtin=r.voices.filter(v=>v.source!=="custom");
  const custom=r.voices.filter(v=>v.source==="custom");
  const male=builtin.filter(v=>/^male/i.test(v.description||""));
  const fem=builtin.filter(v=>/^female/i.test(v.description||""));
  const other=builtin.filter(v=>!/^male|^female/i.test(v.description||""));
  const opt=v=>`<option value="${v.id}" ${v.id===selected?"selected":""}>${esc(v.display_name)} — ${esc(v.desc_vi||v.description||v.source)}</option>`;
  sel.innerHTML=`<option value="">— tự động (Flow tự chọn, không nhất quán) —</option>`
    +(custom.length?`<optgroup label="Giọng riêng của KOL (clone)">${custom.map(opt).join("")}</optgroup>`:"")
    +`<optgroup label="Nam (${male.length})">${male.map(opt).join("")}</optgroup>`
    +`<optgroup label="Nữ (${fem.length})">${fem.map(opt).join("")}</optgroup>`
    +(other.length?`<optgroup label="Khác (${other.length})">${other.map(opt).join("")}</optgroup>`:"");
  hint.textContent=`${r.voices.length} giọng (${custom.length} clone riêng). Chọn 1 giọng để khoá cố định cho KOL.`;
  sel.onchange=showVoiceSample; showVoiceSample();
}

  const id=$("#f-voiceid").value, box=$("#voicesample"); if(!box) return;

  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(done,()=>{_fallbackCopy(t);done();});

function pipeBar(p){

  const steps=[
    ["Kịch bản", !!p.script, false, ""],
    ["Storyboard", sc.length>0&&nsb===sc.length, nsb>0, `${nsb}/${sc.length}`],
    ["Prompt video", sc.length>0&&nmo===sc.length, nmo>0, `${nmo}/${sc.length}`],

    ["Hoàn thiện", !!p.final_video, false, ""],

  return `<div class="pipe">${steps.map(([t,ok,part,n])=>

  const r=await api("/api/import",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({kind,items})});
  closeModal(); alert("Đã import "+r.imported); load();
};

    <div class="fld"><label>Mật khẩu mới</label><input id="pf-new" type="password" autocomplete="new-password" placeholder="Tối thiểu 6 ký tự (để trống nếu không đổi)"></div>
    <div class="fld"><label>Nhắc lại mật khẩu mới</label><input id="pf-new2" type="password" autocomplete="new-password"></div>

    <div class="row" style="margin-top:12px"><button class="primary" onclick="saveProfile()">💾 Lưu</button><button onclick="closeModal()">Đóng</button></div>`);
  $("#sheetbox").classList.add("detail");
};
window.uploadAvatar=async(ev)=>{
  const f=ev.target.files&&ev.target.files[0]; if(!f) return;
  const err=$("#pf-err"); if(err) err.textContent='';
  if(f.size>2*1024*1024){ if(err) err.textContent='Ảnh vượt quá 2MB'; return; }
  const fd=new FormData(); fd.append('file',f);
  const r=await fetch('/api/me/avatar',{method:'POST',body:fd});
  const d=await r.json().catch(()=>({}));
  if(!r.ok){ if(err) err.textContent=d.detail||'Tải ảnh thất bại'; return; }
  if(window.ME) window.ME.avatar=d.avatar;
  const bust=d.avatar?d.avatar+'?t='+Date.now():null;
  const pv=$("#pf-av"); if(pv) pv.innerHTML=avInner((window.ME||{}).display_name,bust);
  _refreshMeHeader();
};
window.saveProfile=async()=>{
  const err=$("#pf-err"); err.textContent='';
  const body={display_name:($("#pf-name").value||'').trim()};
  const np=$("#pf-new")?$("#pf-new").value:'', np2=$("#pf-new2")?$("#pf-new2").value:'';
  if(np||np2){
    if(np!==np2){ err.textContent='Hai ô mật khẩu mới chưa khớp'; return; }
    if(np.length<6){ err.textContent='Mật khẩu mới tối thiểu 6 ký tự'; return; }
    body.new_password=np;
    if($("#pf-old")) body.old_password=$("#pf-old").value;
  }
  const r=await fetch('/api/me',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await r.json().catch(()=>({}));
  if(!r.ok){ err.textContent=d.detail||'Lưu thất bại'; return; }
  if(window.ME){ window.ME.display_name=d.display_name; window.ME.has_password=d.has_password; window.USERMAP[window.ME.user]=d.display_name; }
  _refreshMeHeader(); closeModal();
};

/* ===== QUẢN TRỊ THÀNH VIÊN (admin) ===== */
window.USERS=[];
async function loadUsers(){
  if(!_isAdminUI()) return;
  try{ USERS=await api('/api/users'); }catch(e){ USERS=[]; }
  USERS.forEach(u=>{ window.USERMAP[u.user]=u.display_name||u.user; });
  const pend=USERS.filter(u=>u.status==='pending').length;
  const e=document.getElementById('n-users'); if(e){ e.textContent=pend||''; e.classList.toggle('hot',pend>0); }
  if(view==='users') renderUsers();
}
const _ust={active:['active','Hoạt động'],pending:['pending','Chờ duyệt'],disabled:['disabled','Bị khoá']};
function _uav(u){return `<span class="uav">${avInner(u.display_name||u.user,u.avatar)}</span>`;}
function renderUsers(){
  if(!_isAdminUI()){ $("#app").innerHTML='<div class="hint" style="padding:26px;text-align:center;background:var(--card);border:1px solid var(--bd);border-radius:var(--r)">Chỉ quản trị viên mới xem được trang này.</div>'; return; }
  const pend=USERS.filter(u=>u.status==='pending');
  const members=USERS.filter(u=>u.status!=='pending');
  const pendHtml=pend.length?pend.map(u=>`
    <div class="pcard">
      ${_uav(u)}
      <div style="flex:1">
        <div class="nm">${esc(u.display_name||u.user)} <span style="font-family:ui-monospace,monospace;color:var(--mut);font-size:12px">@${esc(u.user)}</span></div>
        <div class="hint">Đăng ký: ${u.created?new Date(u.created*1000).toLocaleString('vi-VN'):'—'}</div>
      </div>
      <button class="mini primary" onclick="approveUser('${esc(u.user)}')">✅ Duyệt</button>
      <button class="mini" onclick="rejectUser('${esc(u.user)}')">✕ Từ chối</button>
    </div>`).join(''):'<div class="hint">Không có đăng ký nào đang chờ.</div>';
  const rows=members.map(u=>{
    const st=_ust[u.status]||_ust.active;
    const isMe=window.ME&&u.user===window.ME.user;
    return `<div class="urow">
      ${_uav(u)}
      <div style="flex:1;min-width:0">
        <div class="nm">${esc(u.display_name||u.user)} ${isMe?'<span class="authchip">bạn</span>':''}</div>
        <div class="hint" style="font-family:ui-monospace,monospace">@${esc(u.user)}</div>
      </div>
      <select onchange="setUserRole('${esc(u.user)}',this.value)" ${isMe?'disabled title="không tự đổi quyền của mình"':''} style="height:32px">
        <option value="member" ${u.role==='member'?'selected':''}>Thành viên</option>
        <option value="admin" ${u.role==='admin'?'selected':''}>Quản trị</option>
      </select>
      <span class="ust ${st[0]}">${st[1]}</span>
      <button class="mini" onclick="toggleUser('${esc(u.user)}','${u.status==='disabled'?'active':'disabled'}')">${u.status==='disabled'?'🔓 Mở khoá':'🔒 Khoá'}</button>
      <button class="mini" onclick="resetUserPw('${esc(u.user)}')">🔑 Reset MK</button>
      ${isMe?'':`<button class="mini" onclick="deleteUser('${esc(u.user)}')" title="Xoá tài khoản">🗑</button>`}
    </div>`;}).join('');
  $("#app").innerHTML=`
    <h2>⏳ Chờ duyệt ${pend.length?`<span class="hint" style="font-weight:400">· ${pend.length}</span>`:''}</h2>
    <div style="margin-bottom:22px">${pendHtml}</div>
    <h2>Thành viên <span class="hint" style="font-weight:400">· ${members.length}</span></h2>
    <div>${rows||'<div class="hint">Chưa có thành viên.</div>'}</div>`;
}
window.approveUser=async(u)=>{ await _patchUser(u,{status:'active'}); };
window.toggleUser=async(u,st)=>{ await _patchUser(u,{status:st}); };
window.setUserRole=async(u,role)=>{ await _patchUser(u,{role}); };
async function _patchUser(u,body){
  const r=await fetch('/api/users/'+encodeURIComponent(u),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){ const d=await r.json().catch(()=>({})); alert(d.detail||'Thao tác thất bại'); }
  await loadUsers();
}
window.rejectUser=async(u)=>{
  if(!confirm('Từ chối và xoá đăng ký "'+u+'"?')) return;
  await _delUser(u);
};
window.deleteUser=async(u)=>{
  if(!confirm('Xoá tài khoản "'+u+'"? Không thể hoàn tác.')) return;
  await _delUser(u);
};
async function _delUser(u){
  const r=await fetch('/api/users/'+encodeURIComponent(u),{method:'DELETE'});
  if(!r.ok){ const d=await r.json().catch(()=>({})); alert(d.detail||'Xoá thất bại'); }
  await loadUsers();
}
window.resetUserPw=async(u)=>{
  const r=await fetch('/api/users/'+encodeURIComponent(u),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({reset_password:true})});
  const d=await r.json().catch(()=>({}));
  if(!r.ok){ alert(d.detail||'Reset thất bại'); return; }
  openModal(`<h3>🔑 Mật khẩu tạm cho @${esc(u)}</h3>
    <div class="hint" style="margin-bottom:6px">Gửi cho thành viên. Mật khẩu chỉ hiện <b>một lần</b> — thành viên nên đổi sau khi đăng nhập.</div>
    <div class="tmpbox"><span id="tmp-pw">${esc(d.temp_password||'')}</span>
      <button class="mini" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(d.temp_password||'')}');this.textContent='✓ Đã copy'">⧉ Copy</button></div>
    <div class="row" style="margin-top:14px"><button class="primary" onclick="closeModal()">Xong</button></div>`);
};

function openModal(h){$("#sheetbox").innerHTML=h;$("#modal").classList.add("on");}
function closeModal(){$("#modal").classList.remove("on");$("#sheetbox").classList.remove("wide","detail");} window.closeModal=closeModal;
// ===== Agent nổi =====
let agentOpen=false, CMDS=[];
window.toggleAgent=()=>{ agentOpen=!agentOpen; $("#apanel").classList.toggle("on",agentOpen); if(agentOpen){pollAgent();$("#ain").focus();} };
function setAgentDots(st){
  window._agentSt=st;
  $("#adot").classList.toggle("on",!!st.online);
  $("#adot2").classList.toggle("on",!!st.online);
  $("#astside").textContent = st.online ? (st.busy?"Agent: đang chạy…":"Agent: sẵn sàng") : "Agent: offline";
}
async function pollAgent(){
  try{
    const [st,cmds]=await Promise.all([api("/api/agent/status"),api("/api/commands")]);
    setAgentDots(st);
    $("#ast").textContent = st.online ? (st.running?`đang chạy ${st.running}/${st.max_parallel||''} việc`:(st.busy?`đang chạy: ${st.current||'…'}`:"sẵn sàng")) : "offline — chạy START-AGENT.bat";
    const feed=$("#afeed");
    const atBottom = feed.scrollHeight-feed.scrollTop-feed.clientHeight<60;
    const eName={claude:'🧠 Claude',codex:'⚡ Codex',gemini:'✦ Gemini',oss:'🖥️ OSS'};
    CMDS=cmds.slice().reverse();
    feed.innerHTML=CMDS.map(c=>{
      const eng=eName[c.engine||'claude']||('🧠 '+(c.engine||'claude'));
      const thread=c.resume_session?` <span title="tin này nối tiếp phiên trước">🔗</span>`:'';
      const me=`<div class="msg me">${esc(c.text)}<div class="mt" style="text-align:right">${eng}${thread}</div></div>`;
      let ai="";
      if(c.status==="pending") ai=`<div class="msg ai run">⏳ chờ điều phối…</div>`;
      else if(c.status==="running") ai=`<div class="msg ai run">⚙️ ${eng} đang làm…</div>`;
      else if(c.response){
        const reply=(c.session_id&&(c.engine||'claude')==='claude')
          ?` · <span style="cursor:pointer;color:var(--brand)" onclick="agSetReply('${c.session_id}','${esc((c.label||c.text).slice(0,40)).replace(/'/g,"\\'")}')" title="Chat tiếp trong CÙNG phiên này (nhớ ngữ cảnh)">↩ Tiếp</span>`:'';
        ai=`<div class="msg ai${c.status==='failed'?' run':''}">${esc(c.response)}<div class="mt">${c.status==='failed'?'⚠️ lỗi':'✅ xong'} · ${eng}${reply}</div></div>`;
      }
      return me+ai;
    }).join("");
    // mạch tự trôi: lệnh follow-up vừa gửi xong -> chuyển chip sang phiên MỚI nhất của mạch
    if(window._agReply&&window._agReply.waitCid){
      const c=CMDS.find(x=>x.id===window._agReply.waitCid);
      if(c&&c.status!=="pending"&&c.status!=="running"&&c.session_id){
        window._agReply.sid=c.session_id; window._agReply.waitCid=null;
      }
    }
    if(atBottom) feed.scrollTop=feed.scrollHeight;
  }catch(e){ $("#ast").textContent="studio lỗi"; }
}
async function pollStatusLight(){ if(window.PORTAL) return; try{ setAgentDots(await api("/api/agent/status")); }catch(e){} }
window.agSetReply=(sid,label)=>{
  window._agReply={sid,label,waitCid:null};
  $("#areply").style.display=""; $("#areply-lb").textContent=label;
  $("#ain").focus();
};
window.agClearReply=()=>{ window._agReply=null; $("#areply").style.display="none"; };
window.sendCmd=async()=>{
  const t=$("#ain").value.trim(); if(!t) return;
  $("#ain").value="";
  const body={text:t};
  if(window._agReply&&window._agReply.sid) body.resume_session=window._agReply.sid;
  const r=await api("/api/commands",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(window._agReply) window._agReply.waitCid=r.id; // xong thì chip trôi sang phiên mới của mạch
  pollAgent();
};
$("#ain").addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendCmd(); } });
setInterval(()=>{ if(agentOpen) pollAgent(); },3000);
setInterval(pollStatusLight,10000);
