<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b0f1a" />
<title>Kanban Kịch bản</title>
<style>
  :root{--bg:#0b0f1a;--surf:#141a29;--surf2:#1c2333;--surf3:#252d40;--bd:#2b344a;--txt:#e8ecf4;--mut:#8b94a8;--muthi:#aab3c7;--acc:#7c3aed;--accbg:#2a1e4d;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:15px}
  body{display:flex;flex-direction:column;overflow:hidden}
  .top{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:5}
  .top h1{font-size:16px;margin:0;flex:1;font-weight:800}
  .sync{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .sync.on{color:var(--ok);background:rgba(34,197,94,.12)}
  .sync.off{color:var(--warn);background:rgba(245,158,11,.12)}
  .btn{background:var(--surf3);border:1px solid var(--bd);color:var(--txt);border-radius:9px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn--acc{background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;color:#fff}
  .btn--err{color:#ff9b9b;border-color:#5b2330}
  .btn:active{filter:brightness(.9)}
  .tabs{display:flex;gap:6px;overflow-x:auto;padding:8px 12px;background:var(--surf);border-bottom:1px solid var(--bd);scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;padding:7px 12px;border-radius:20px;background:var(--surf2);border:1px solid var(--bd);color:var(--mut);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
  .tab.on{background:var(--accbg);border-color:var(--acc);color:var(--txt)}
  .tab .n{font-size:11px;background:var(--surf3);border-radius:20px;padding:0 6px}
  .list{flex:1;overflow-y:auto;padding:10px 12px 90px;-webkit-overflow-scrolling:touch}
  .card{background:var(--surf2);border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer}
  .card:active{border-color:var(--acc)}
  .card .code{display:inline-block;font-size:10px;font-weight:800;color:var(--acc);background:var(--accbg);border:1px solid var(--bd);border-radius:5px;padding:1px 6px;margin-bottom:6px;font-family:ui-monospace,monospace}
  .card .tt{font-size:14px;font-weight:600;line-height:1.35;margin-bottom:6px}
  .chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:2px}
  .chip{font-size:10.5px;background:var(--surf3);border:1px solid var(--bd);border-radius:6px;padding:2px 7px;color:var(--muthi)}
  .foot{display:flex;gap:10px;font-size:10.5px;color:var(--mut);margin-top:6px}
  .foot .done{color:#00e5a0}
  .empty{color:var(--mut);text-align:center;padding:30px 10px;font-size:13px}
  .fab{position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;z-index:6}
  .fab button{width:52px;height:52px;border-radius:50%;border:none;font-size:22px;color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.5);cursor:pointer}
  .fab .add{background:linear-gradient(135deg,#a855f7,#7c3aed)}
  .fab .order{background:linear-gradient(135deg,#0ea5e9,#2563eb);font-size:20px}
  /* modal full-screen mobile */
  .modal{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.55);display:flex;align-items:flex-end}
  .sheet{width:100%;max-height:96vh;background:var(--bg);border-radius:16px 16px 0 0;display:flex;flex-direction:column;overflow:hidden}
  @media(min-width:640px){.modal{align-items:center;justify-content:center}.sheet{max-width:560px;border-radius:16px;max-height:92vh}}
  .sheet .sh{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--bd)}
  .sheet .sh .g{flex:1}
  .sheet .bd{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  label{display:flex;flex-direction:column;gap:5px;font-size:12px;font-weight:700;color:var(--muthi)}
  input,select,textarea{width:100%;background:var(--surf2);border:1px solid var(--bd);border-radius:9px;color:var(--txt);padding:10px 12px;font-size:15px;font-family:inherit;outline:none}
  input:focus,select,textarea:focus{border-color:var(--acc)}
  textarea{resize:vertical;min-height:200px;line-height:1.6}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .sheet .ft{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--bd)}
  .x{background:none;border:none;color:var(--mut);font-size:22px;cursor:pointer;padding:0 4px}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--surf3);border:1px solid var(--bd);border-radius:10px;padding:10px 16px;font-size:13px;z-index:40;opacity:0;transition:opacity .2s;pointer-events:none;max-width:88vw}
  .toast.show{opacity:1}
  .toast.ok{border-color:var(--ok)}.toast.err{border-color:var(--err);color:#ff9b9b}
</style>
</head>
<body>
  <div class="top">
    <button class="btn" title="Trang chủ" onclick="location.href='/'">🏢</button>
    <h1>📋 Kanban Kịch bản</h1>
    <span id="sync" class="sync off">…</span>
    <button class="btn" onclick="load()">↻</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="list" id="list"><div class="empty">Đang tải…</div></div>
  <div class="fab">
    <button class="order" title="Đặt hàng kịch bản" onclick="openOrder()">📨</button>
    <button class="add" title="Thêm thẻ" onclick="openTask(null)">＋</button>
  </div>
  <div id="modal"></div>
  <input id="sceneFile" type="file" accept="image/*" style="display:none" onchange="onSceneFile(event)">
  <div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s), esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let DATA={columns:[],tasks:[],kols:[],products:[],channels:[],cmds:[]}, curCol=null;

async function api(path,opt){const r=await fetch(path,opt);if(!r.ok)throw new Error((await r.json().catch(()=>({}))).detail||('HTTP '+r.status));return r.json();}
function toast(m,k){const t=$('#toast');t.textContent=m;t.className='toast show '+(k||'');setTimeout(()=>t.className='toast',2600);}

async function load(){
  try{
    DATA=await api('/api/fbkanban/board');
    if(!curCol && DATA.columns[0]) curCol=DATA.columns[0].id;
    const sy=DATA.sync||{}; const el=$('#sync');
    el.className='sync '+(sy.alive?'on':'off'); el.textContent=sy.alive?'🟢 Xưởng online':'🟡 Xưởng offline';
    render();
  }catch(e){ if((''+e).includes('401')){location.href='/';return;} toast('Lỗi tải: '+e,'err'); }
}
function colName(ref){const c=DATA.columns.find(x=>x.id===ref);return c?c.name:'—';}
function refName(list,ref){const x=list.find(v=>v.id===ref);return x?x.name:null;}

function render(){
  const tabs=$('#tabs'); tabs.innerHTML='';
  DATA.columns.forEach(c=>{
    const n=DATA.tasks.filter(t=>t.column_ref===c.id).length;
    const b=document.createElement('div'); b.className='tab'+(c.id===curCol?' on':'');
    b.innerHTML=esc(c.name)+' <span class="n">'+n+'</span>';
    b.onclick=()=>{curCol=c.id;render();}; tabs.appendChild(b);
  });
  const list=$('#list'); const items=DATA.tasks.filter(t=>t.column_ref===curCol).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  if(!items.length){ list.innerHTML='<div class="empty">Cột trống. Bấm ＋ để thêm thẻ.</div>'; return; }
  list.innerHTML='';
  items.forEach(t=>{
    const kol=refName(DATA.kols,t.kol_ref), ch=refName(DATA.channels,t.channel_ref), pr=refName(DATA.products,t.product_ref);
    const chips=[kol&&'🧑‍🎨 '+kol, ch&&'📡 '+ch, pr&&'📦 '+pr].filter(Boolean).map(c=>'<span class="chip">'+esc(c)+'</span>').join('');
    const sc=(t.scenes||[]).length;
    const d=document.createElement('div'); d.className='card';
    d.innerHTML=(t.code?'<span class="code">'+esc(t.code)+'</span>':'')
      +'<div class="tt">'+esc(t.title)+'</div>'
      +(chips?'<div class="chips">'+chips+'</div>':'')
      +'<div class="foot">'+(sc?'<span>🎬 '+sc+' cảnh</span>':'')+(t.board_exists?'<span class="done">✅ đã tạo dự án</span>':'')+'</div>';
    d.onclick=()=>openTask(t); list.appendChild(d);
  });
}

function optList(list,sel,label){return '<option value="">'+label+'</option>'+list.map(x=>'<option value="'+x.id+'"'+(x.id===sel?' selected':'')+'>'+esc(x.name)+'</option>').join('');}

let EDIT_SCENES=[], SCENE_PICK=-1;
function openTask(t){
  const isNew=!t; t=t||{scenes:[]};
  EDIT_SCENES=JSON.parse(JSON.stringify(t.scenes||[]));
  const m=$('#modal'); m.innerHTML=`
   <div class="modal" onclick="if(event.target===this)closeM()">
    <div class="sheet">
     <div class="sh"><span class="code" style="${t.code?'':'display:none'}">${esc(t.code||'')}</span><span class="g" style="font-weight:800">${isNew?'Thẻ mới':'Sửa thẻ'}</span><button class="x" onclick="closeM()">✕</button></div>
     <div class="bd">
      <label>Tiêu đề<input id="f_title" value="${esc(t.title||'')}" placeholder="Tiêu đề thẻ"></label>
      <label>Cột<select id="f_col">${optList(DATA.columns,t.column_ref||curCol,'— chọn cột —')}</select></label>
      <div class="row2">
        <label>Nhân vật (KOL)<select id="f_kol">${optList(DATA.kols,t.kol_ref,'—')}</select></label>
        <label>Kênh<select id="f_chan">${optList(DATA.channels,t.channel_ref,'—')}</select></label>
      </div>
      <label>Sản phẩm<select id="f_prod">${optList(DATA.products,t.product_ref,'—')}</select></label>
      <label>Kịch bản (lời thoại)<textarea id="f_script" placeholder="Nội dung kịch bản…">${esc(t.script||'')}</textarea></label>
      <label>Ghi chú<textarea id="f_note" style="min-height:70px" placeholder="Voice direction / ghi chú…">${esc(t.note||'')}</textarea></label>
      <div id="scenesBox"></div>
      ${isNew?'':'<div class="row2"><button class="btn" onclick="cmd(\'produce_basic\',{task_ref:\''+t.id+'\'})">▶ Dự án cơ bản</button><button class="btn btn--acc" onclick="cmd(\'produce_workflow\',{task_ref:\''+t.id+'\'})">🏭 Sản xuất workflow</button></div><div style="font-size:11px;color:var(--mut);margin-top:-4px">Gửi lệnh về Xưởng (PC) chạy — không tạo tại VPS.</div>'}
     </div>
     <div class="ft">
      <button class="btn btn--acc" style="flex:1" onclick="saveTask('${isNew?'':t.id}')">💾 Lưu</button>
      ${isNew?'':'<button class="btn btn--err" onclick="delTask(\''+t.id+'\')">🗑</button>'}
     </div>
    </div></div>`;
  renderScenes();
}
function closeM(){$('#modal').innerHTML='';}

function renderScenes(){
  const box=$('#scenesBox'); if(!box) return;
  let h='<div style="font-size:12px;font-weight:700;color:var(--muthi);margin:2px 0 8px">🎬 Cảnh ('+EDIT_SCENES.length+') — mỗi cảnh: ảnh storyboard + prompt ảnh + JSON video</div>';
  EDIT_SCENES.forEach((s,i)=>{
    const mid=s.storyboard_media_id, pend=s.storyboard_pending_rel;
    const src=pend?('/'+pend):(mid?('/fbmedia/'+mid+'.jpg'):null);
    const img=src?'<img src="'+esc(src)+'" loading="lazy" style="width:100%;height:100%;border-radius:8px;object-fit:cover" onerror="this.style.opacity=.25">'
      :'<div style="width:100%;height:100%;display:grid;place-items:center;font-size:11px;color:var(--mut);text-align:center">⬆ Dán /<br>chọn ảnh</div>';
    h+='<div style="background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:10px;margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:12px;font-weight:800;color:var(--acc)">Cảnh '+(s.idx||i+1)+'</span>'
      +'<button class="btn btn--err" style="margin-left:auto;padding:4px 10px" onclick="delScene('+i+')">🗑</button></div>'
      +'<div style="aspect-ratio:3/4;max-width:132px;background:#000;border-radius:8px;position:relative;margin-bottom:10px" onclick="pickSceneImg('+i+')">'
      +img+(pend?'<span style="position:absolute;left:3px;bottom:3px;font-size:9px;background:rgba(245,158,11,.9);color:#000;border-radius:4px;padding:0 4px">⏳ chờ Xưởng</span>':'')
      +'<span style="position:absolute;right:3px;top:3px;font-size:12px;background:rgba(0,0,0,.6);border-radius:6px;padding:2px 5px">📷</span></div>'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:11px;font-weight:700;color:var(--muthi)">🖼 Prompt tạo ảnh storyboard</span>'
      +'<button class="btn" style="margin-left:auto;padding:2px 9px;font-size:13px" onclick="copyText(EDIT_SCENES['+i+'].image_prompt,\'prompt ảnh\')">📋</button></div>'
      +'<textarea style="min-height:64px;margin-bottom:10px" placeholder="Prompt sinh ảnh storyboard cảnh này… (dán ChatGPT / Nano)" oninput="EDIT_SCENES['+i+'].image_prompt=this.value">'+esc(s.image_prompt||'')+'</textarea>'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:11px;font-weight:700;color:var(--muthi)">🎬 JSON prompt tạo video</span>'
      +'<button class="btn" style="margin-left:auto;padding:2px 9px;font-size:13px" onclick="copyText(EDIT_SCENES['+i+'].prompt_json,\'JSON video\')">📋</button></div>'
      +'<textarea style="min-height:64px;font-family:ui-monospace,monospace;font-size:13px" placeholder=\'{&quot;scene&quot;:1,...}\' oninput="EDIT_SCENES['+i+'].prompt_json=this.value">'+esc(s.prompt_json||'')+'</textarea>'
      +'</div>';
  });
  h+='<button class="btn" style="width:100%" onclick="addScene()">＋ Thêm cảnh</button>';
  box.innerHTML=h;
}
function addScene(){ const mx=EDIT_SCENES.reduce((m,s)=>Math.max(m,s.idx||0),0); EDIT_SCENES.push({idx:mx+1,image_prompt:'',prompt_json:'',storyboard_media_id:null}); renderScenes(); }
function delScene(i){ EDIT_SCENES.splice(i,1); renderScenes(); }
async function copyText(t,label){ if(!t||!(''+t).trim()){toast('Chưa có nội dung','err');return;} try{await navigator.clipboard.writeText(t);toast('Đã copy '+(label||''),'ok');}catch(e){toast('Không copy được (trình duyệt chặn)','err');} }
function pickSceneImg(i){ SCENE_PICK=i; $('#sceneFile').click(); }
async function onSceneFile(e){
  const f=e.target.files&&e.target.files[0]; e.target.value=''; if(!f||SCENE_PICK<0)return;
  try{
    const fd=new FormData(); fd.append('file',f);
    const r=await api('/api/fbkanban/upload',{method:'POST',body:fd});
    EDIT_SCENES[SCENE_PICK].storyboard_pending_rel=r.rel;
    delete EDIT_SCENES[SCENE_PICK].storyboard_media_id;
    renderScenes(); toast('Đã tải ảnh — lưu để Xưởng nhận','ok');
  }catch(err){toast('Lỗi tải ảnh: '+err,'err');}
}

async function saveTask(id){
  const body={title:$('#f_title').value.trim(),column_ref:$('#f_col').value||null,
    kol_ref:$('#f_kol').value||null,channel_ref:$('#f_chan').value||null,product_ref:$('#f_prod').value||null,
    script:$('#f_script').value,note:$('#f_note').value,scenes:EDIT_SCENES};
  if(!body.title){toast('Nhập tiêu đề','err');return;}
  try{
    if(id) await api('/api/fbkanban/task/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    else await api('/api/fbkanban/task',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    closeM(); toast('Đã lưu ✓ (đồng bộ về Xưởng)','ok'); load();
  }catch(e){toast('Lỗi lưu: '+e,'err');}
}
async function delTask(id){
  if(!confirm('Xoá thẻ này?'))return;
  try{await api('/api/fbkanban/task/'+id,{method:'DELETE'});closeM();toast('Đã xoá','ok');load();}catch(e){toast('Lỗi: '+e,'err');}
}
async function cmd(c,payload){
  try{await api('/api/fbkanban/cmd',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd:c,payload})});
    closeM();toast('Đã gửi lệnh về Xưởng — chờ máy xử lý','ok');load();}catch(e){toast('Lỗi: '+e,'err');}
}

function openOrder(){
  const m=$('#modal'); m.innerHTML=`
   <div class="modal" onclick="if(event.target===this)closeM()">
    <div class="sheet">
     <div class="sh"><span class="g" style="font-weight:800">📨 Đặt hàng kịch bản</span><button class="x" onclick="closeM()">✕</button></div>
     <div class="bd">
      <p style="font-size:12px;color:var(--mut);margin:0">Chọn sản phẩm (đã gắn não). Xưởng sẽ để AI soạn N thẻ rồi đồng bộ lên đây.</p>
      <label>Sản phẩm<select id="o_prod">${optList(DATA.products.filter(p=>p.brain_code),null,'— chọn SP có não —')}</select></label>
      <div class="row2">
        <label>Nhân vật<select id="o_kol">${optList(DATA.kols,null,'—')}</select></label>
        <label>Kênh<select id="o_chan">${optList(DATA.channels,null,'—')}</select></label>
      </div>
      <div class="row2">
        <label>Số bản<select id="o_n"><option>1</option><option>2</option><option selected>3</option><option>5</option></select></label>
        <label>Giọng<select id="o_gender"><option value="">Theo KOL</option><option value="nu">♀ Nữ</option><option value="nam">♂ Nam</option></select></label>
      </div>
      <label>Ý tưởng thêm<textarea id="o_idea" style="min-height:60px" placeholder="vd: nhấn phong thủy 3 màu…"></textarea></label>
     </div>
     <div class="ft"><button class="btn btn--acc" style="flex:1" onclick="sendOrder()">📨 Gửi Xưởng soạn</button></div>
    </div></div>`;
}
async function sendOrder(){
  const prod=$('#o_prod').value; if(!prod){toast('Chọn sản phẩm','err');return;}
  const payload={product_ref:prod,kol_ref:$('#o_kol').value||null,channel_ref:$('#o_chan').value||null,
    count:parseInt($('#o_n').value),gender:$('#o_gender').value||null,idea:$('#o_idea').value.trim()||null};
  cmd('order_scripts',payload);
}

load(); setInterval(load, 12000);
</script>
</body>
</html>
